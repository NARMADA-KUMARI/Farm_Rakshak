server:
  port: 8089
spring:
  application:
    name: admin-service
services:
  user-service: ${USER_SERVICE_URL:http://localhost:8082}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
