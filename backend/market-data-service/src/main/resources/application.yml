server:
  port: 8091
  servlet:
    context-path: /

spring:
  application:
    name: market-data-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/farmrakshak_market
    username: ${POSTGRES_USER:farmrakshak}
    password: ${POSTGRES_PASSWORD:farmrakshak_dev}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Internal service URLs (via Eureka)
services:
  crop-service-url: ${CROP_SERVICE_URL:http://localhost:8083}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Market data ingestion schedule
market:
  ingestion:
    cron: "0 0 */6 * * *"
  cache:
    ttl-hours: 6
