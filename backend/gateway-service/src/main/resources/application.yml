server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**,/api/v1/i18n/**
        - id: farm-service
          uri: lb://crop-service
          predicates:
            - Path=/api/v1/farms/**
        - id: crop-service
          uri: lb://crop-service
          predicates:
            - Path=/api/v1/crops/**
        - id: weather-service
          uri: lb://weather-service
          predicates:
            - Path=/api/v1/weather/**
        - id: advisory-service
          uri: lb://advisory-service
          predicates:
            - Path=/api/v1/advisories/**
        - id: blog-service
          uri: lb://blog-service
          predicates:
            - Path=/api/v1/blogs/**
        - id: market-data-service
          uri: lb://market-data-service
          predicates:
            - Path=/api/v1/market/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/v1/admin/**
  codec:
    max-in-memory-size: 10MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:farmrakshak-super-secret-key-that-is-at-least-256-bits-long-for-hs256}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
