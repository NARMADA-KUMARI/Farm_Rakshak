server:
  port: 8088
spring:
  application:
    name: blog-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/farmrakshak_blog
    username: ${POSTGRES_USER:farmrakshak}
    password: ${POSTGRES_PASSWORD:farmrakshak_dev}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info
