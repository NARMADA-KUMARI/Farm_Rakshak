server:
  port: 8086
spring:
  application:
    name: advisory-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/farmrakshak_advisory
    username: ${POSTGRES_USER:farmrakshak}
    password: ${POSTGRES_PASSWORD:farmrakshak_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# AI Configuration
mistral:
  api-key: ${MISTRAL_API_KEY:}
  model: ${MISTRAL_MODEL:mistral-small-latest}
  url: https://api.mistral.ai/v1/chat/completions

gemini:
  api-key: ${GEMINI_API_KEY:}

# Inter-service URLs (via Docker DNS)
services:
  crop-url: http://crop-service:8083
  weather-url: http://weather-service:8085

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
