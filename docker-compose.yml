version: '3.8'

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmrakshak"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core Services ───────────────────────────────────────────────
  eureka-server:
    build:
      context: ./backend
      args:
        SERVICE_NAME: eureka-server
        SERVICE_PORT: 8761
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: gateway-service
        SERVICE_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-farmrakshak-super-secret-key-that-is-at-least-256-bits-long-for-hs256}

  auth-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-farmrakshak-super-secret-key-that-is-at-least-256-bits-long-for-hs256}

  user-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: user-service
        SERVICE_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}

  crop-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: crop-service
        SERVICE_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}

  ai-client-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: ai-client-service
        SERVICE_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AI_SERVICE_URL: http://ai-service:8090
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-qF45WABNznfYyVvOtigA02Qy9HxgaBZW}

  weather-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: weather-service
        SERVICE_PORT: 8085
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      REDIS_HOST: redis
      WEATHER_API_KEY: ${WEATHER_API_KEY:-fa31e11a5c9fed509867e0aa54534520}

  advisory-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: advisory-service
        SERVICE_PORT: 8086
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-qF45WABNznfYyVvOtigA02Qy9HxgaBZW}
      REDIS_HOST: redis

  notification-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: 8087
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  blog-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: blog-service
        SERVICE_PORT: 8088
    ports:
      - "8088:8088"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}

  admin-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: admin-service
        SERVICE_PORT: 8089
    ports:
      - "8089:8089"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      USER_SERVICE_URL: http://user-service:8082

  ai-service:
    build: ./ai/ai-service
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  market-data-service:
    build:
      context: ./backend
      args:
        SERVICE_NAME: market-data-service
        SERVICE_PORT: 8091
    ports:
      - "8091:8091"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-farmrakshak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmrakshak_dev}
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CROP_SERVICE_URL: http://crop-service:8083

volumes:
  postgres_data:
  redis_data:
  minio_data:
